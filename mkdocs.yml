site_name: Drift Detector
site_description: A Claude Code plugin that scores every assistant turn for behavioral drift from your active output contract and steers it back automatically.
site_url: https://88plug.github.io/drift-detector/
repo_url: https://github.com/88plug/drift-detector
repo_name: 88plug/drift-detector
edit_uri: edit/master/docs/
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
