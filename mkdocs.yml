site_name: Drift Detector
site_description: 'Claude Code + Grok drift detection plugin — scores every assistant turn against your output contract and steers the LLM back when instruction-following erodes.'
site_url: https://88plug.github.io/drift-detector/
repo_url: https://github.com/88plug/drift-detector
repo_name: 88plug/drift-detector
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Algorithm: algorithm.md
  - Eval & Tuning: eval.md
  - Profiles: profiles.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
